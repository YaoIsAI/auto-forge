<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1440px;
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(160deg, #0a0e27 0%, #0f172a 30%, #1a1040 60%, #0f172a 100%);
  color: white;
  overflow: hidden;
  position: relative;
}

.grid-bg {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(7,193,96,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(7,193,96,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
}

.orb1 {
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(7,193,96,0.15) 0%, transparent 70%);
  top: -100px; right: -150px;
  border-radius: 50%;
}
.orb2 {
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(102,126,234,0.12) 0%, transparent 70%);
  bottom: 100px; left: -100px;
  border-radius: 50%;
}

.content {
  position: relative;
  z-index: 10;
  padding: 100px 80px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 60px;
}
.anthropic-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 22px;
  color: #94a3b8;
}
.anthropic-logo .dot {
  width: 28px;
  height: 28px;
  background: #d4a574;
  border-radius: 50%;
}
.claude-badge {
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(212,165,116,0.15);
  border: 1px solid rgba(212,165,116,0.3);
  border-radius: 100px;
  padding: 14px 30px;
  font-size: 20px;
  color: #d4a574;
  letter-spacing: 1px;
}
.claude-icon-small {
  width: 28px;
  height: 28px;
}

.title-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 30px;
}
.claude-icon-large {
  width: 140px;
  height: 140px;
  flex-shrink: 0;
}

.logo-text {
  font-size: 180px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -4px;
}

.subtitle {
  font-size: 52px;
  font-weight: 300;
  color: #94a3b8;
  line-height: 1.4;
}

.tagline {
  font-size: 36px;
  color: #64748b;
  line-height: 1.6;
  border-left: 4px solid #07c160;
  padding-left: 28px;
}

.command-box {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(7,193,96,0.3);
  border-radius: 16px;
  padding: 28px 36px;
  margin-top: 30px;
}
.command-label {
  font-size: 18px;
  color: #07c160;
  letter-spacing: 2px;
  margin-bottom: 14px;
}
.command-text {
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 36px;
  color: #07c160;
}
.command-text .cursor {
  display: inline-block;
  width: 4px;
  height: 36px;
  background: #07c160;
  margin-left: 4px;
  animation: blink 1s infinite;
}
@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-top: 30px;
}
.pill {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 16px 28px;
  font-size: 24px;
  color: #cbd5e1;
}

.bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.version {
  font-size: 26px;
  color: #475569;
}
.version strong {
  color: #07c160;
}
.cta {
  background: linear-gradient(135deg, #07c160, #06ae56);
  border-radius: 16px;
  padding: 24px 56px;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 1px;
  text-align: center;
  line-height: 1.5;
}
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>

  <div class="content">
    <div class="top-bar">
      <div class="anthropic-logo">
        <div class="dot"></div>
        <span>Powered by Anthropic</span>
      </div>
      <div class="claude-badge">
        <img class="claude-icon-small" src="claude-icon.png" alt="Claude Code">
        <span>CLAUDE CODE PLUGIN</span>
      </div>
    </div>

    <div class="title-area">
      <div class="logo-row">
        <img class="claude-icon-large" src="claude-icon.png" alt="Claude Code">
        <div class="logo-text">Forge</div>
      </div>
      <div class="subtitle">
        全自动工作流引擎<br>
        <span style="font-size:36px;color:#64748b;">Multi-Phase Workflow Engine for Claude Code</span>
      </div>

      <div class="command-box">
        <div class="command-label">ONE COMMAND TO RULE THEM ALL</div>
        <div class="command-text">/forge &lt;你的任务描述&gt;<span class="cursor"></span></div>
      </div>

      <div class="tagline">
        一句话描述需求，AI 自动完成<br>
        编码 · 评审 · 修复 · 归档
      </div>

      <div class="pills">
        <div class="pill">多 Phase 执行</div>
        <div class="pill">四维并行评审</div>
        <div class="pill">Git 版本控制</div>
        <div class="pill">断点续跑</div>
      </div>
    </div>

    <div class="bottom">
      <div class="version"><strong>v0.2.0</strong> · MIT License</div>
      <div class="cta">github.com/YaoIsAI/auto-forge</div>
    </div>
  </div>
</body>
</html>
